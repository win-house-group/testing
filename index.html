function renderThumbs(stage, files, readOnly) {
  if (!files || !files.length) return '';
  return files.slice(0,4).map((f,i) => `
    <div class="thumb-item">
      <img src="${f}" onclick="window.open(this.src,'_blank')" title="點擊放大">
      ${!readOnly ? `<button class="btn-icon-danger" onclick="removeDesignFile('${stage}',${i})">×</button>` : ''}
    </div>`).join('');
}

function handleDesignUpload(stage) {
  const fi = document.getElementById('fi-'+stage);
  if (!fi || !fi.files[0]) return;
  compressImage(fi.files[0], base64 => {
    if (!DESIGN_DETAIL_CACHE.files) DESIGN_DETAIL_CACHE.files = emptyDesignDetail().files;
    if (!DESIGN_DETAIL_CACHE.files[stage]) DESIGN_DETAIL_CACHE.files[stage] = [];
    DESIGN_DETAIL_CACHE.files[stage].push(base64);
    const container = document.getElementById('thumbs-'+stage);
    if (container) container.innerHTML = renderThumbs(stage, DESIGN_DETAIL_CACHE.files[stage], false);
    fi.value = '';
  });
}

function removeDesignFile(stage, idx) {
  if (!DESIGN_DETAIL_CACHE.files?.[stage]) return;
  DESIGN_DETAIL_CACHE.files[stage].splice(idx, 1);
  const container = document.getElementById('thumbs-'+stage);
  if (container) container.innerHTML = renderThumbs(stage, DESIGN_DETAIL_CACHE.files[stage], false);
}

function compressImage(file, cb) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const maxW = 400;
      const ratio = Math.min(maxW / img.width, 1);
      const canvas = document.createElement('canvas');
      canvas.width  = Math.round(img.width  * ratio);
      canvas.height = Math.round(img.height * ratio);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      cb(canvas.toDataURL('image/jpeg', 0.75));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function readFormInputs() {
  const d  = getMD(CU.email, MONTH) || emptyMD();
  const gt = getTgts(CU.email)[MONTH] || d.gross_target || 1000000;
  d.gross_target = gt;

  // Read design sub-form
  const dd = readDesignSubForm();
  d.design_detail = dd;
  if (!d.items.design) d.items.design = {w1:0,w2:0,w3:0,w4:0,w5:0,notes:''};
  d.items.design.w1    = calcDesignScore(dd);
  d.items.design.w2    = 0;
  d.items.design.w3    = 0;
  d.items.design.w4    = 0;
  d.items.design.w5    = 0;
  d.items.design.notes = dd.notes || '';

  itemsFor(CU.email).forEach(it => {
    if (it.id === 'design' || it.who === 'mgr') return;
    const inp = document.getElementById('i-' + it.id);
    const nt  = document.getElementById('n-' + it.id);
    if (!d.items[it.id]) d.items[it.id] = {w1:'',w2:'',w3:'',w4:'',w5:'',notes:''};
    if (inp) d.items[it.id][WEEK] = inp.value;
    if (nt)  d.items[it.id].notes = nt.value;
  });

  d.brand_files    = [...BRAND_FILES_CACHE];
  d.factory_visits = [...FACTORY_VISITS_CACHE];

  const re = document.getElementById('e-reason');
  const st = document.getElementById('e-strategy');
  if (re) d.reason   = re.value;
  if (st) d.strategy = st.value;
  return d;
}

function saveEntry() {
  const d  = readFormInputs();
  const gt = d.gross_target;

  // Mandatory reason/strategy when any sales KPI is below target
  const belowTarget = itemsFor(CU.email).some(it => {
    if (it.who === 'mgr' || it.id === 'design') return false;
    const id  = d.items[it.id];
    const tot = id ? itemTotal(id) : 0;
    return achievePct(it, tot, gt) < 100;
  });
  const designBelow = calcDesignScore(d.design_detail) < 15;
  if ((belowTarget || designBelow) && (!d.reason.trim() || !d.strategy.trim())) {
    alert('⚠️ 有 KPI 項目未達目標，請填寫「差異原因說明」及「對策與改善計畫」後再儲存。');
    document.getElementById('e-reason')?.focus();
    return;
  }

  setMD(CU.email, MONTH, d);
  alert('✅ 已儲存！');
  go('entry');
}

// ── 共用進度條配色（卡片進度條統一邏輯）──────────────────────────────
// 規則（pct = 達成率%）：
//   灰   ：距離 100% 未完成的距離（≥100% 不出現灰）
//   金   ：超出 100% 的部分（Gold #DF9C41）
//   綠   ：達標 90–100%（#5D8722）
//   橘   ：進展中 70–90%（#AF7231）
//   紅   ：危機 <70%（#C9302C）
// 視覺上限 120%，100% 為固定參考點。回傳 { bar:HTML字串, num:數字顏色 }
function barViz(pct){
  // 配色語意（僅三色）：紅=危機(<70)、橘=進展中(70–90)、綠=達標(≥90)
  // <100：填色段 + 灰尾(距離100%)；≥100：整條綠、無灰尾
  var GREEN='#5D8722', ORANGE='#AF7231', RED='#C9302C', GREY='#E2DDD6', T3='var(--t3)';
  var p = (pct==null||isNaN(pct)) ? 0 : pct;
  var coreCol = p>=90 ? GREEN : p>=70 ? ORANGE : RED;  // 填色依達成區段
  var grad, num;
  if(p<=0){
    grad=GREY; num=T3;
  } else if(p<100){
    // 0→p 填色，p→100 灰(未完成距離)
    grad='linear-gradient(to right,'+coreCol+' 0% '+p+'%,'+GREY+' '+p+'% 100%)';
    num=coreCol;
  } else {
    // ≥100：整條綠、無灰尾（達標）
    grad=GREEN; num=GREEN;
  }
  var bar='<i style="width:100%;background:'+grad+'"></i>';
  return { bar:'<div class="kbar">'+bar+'</div>', num:num };
}

function renderDashboard(OPT){
  OPT=OPT||{};
  const _self = true;                 // 主管總覽已移除，儀表板一律個人視角
  const ppl = [{email:curEmail()}];
  const n = ppl.length||1;
  let gross=0,target=0,kpiSum=0,kpiN=0;
  // 業績毛利依檢視層級拆分：年=全年累計、月=當月、週=當週累積(目標亦累積，與 KPI 同規則)
  ppl.forEach(u=>{
    var tg=getTgts(u.email);
    if(DASH_VIEW==='year'){
      for(var m=1;m<=12;m++){var dd=getMD(u.email,m);if(dd)gross+=itemTotal(dd.items&&dd.items.gross||{}); target+=(tg[m]||1000000);}
    } else if(DASH_VIEW==='week'){
      // 累積規則：到「本週」為止的各週毛利加總 vs 累積目標(月目標÷週數 × 本週序)
      var dW=getMD(u.email,MONTH);
      var mwN=getMonthWeeks(MONTH).length||4;
      var wIdx=(typeof curWeekIndexInMonth==='function')?curWeekIndexInMonth(MONTH):(parseInt(String(WEEK||'w1').replace(/[^0-9]/g,''),10)||1);
      if(dW&&dW.items&&dW.items.gross){
        for(var _w=1;_w<=wIdx;_w++){ gross += parseFloat(dW.items.gross['w'+_w]||0); }  // 累積到本週
      }
      target += ((tg[MONTH]||1000000)/mwN) * wIdx;   // 累積目標
    } else { // month
      var dd=getMD(u.email,MONTH);if(dd)gross+=itemTotal(dd.items&&dd.items.gross||{});
      target+=(tg[MONTH]||1000000);
    }
    const sc=calcMonthScore(u.email,MONTH);if(sc!=null){kpiSum+=sc;kpiN++;}
  });
  const aGross=target?Math.round(gross/target*100):0;
  // KPI 總分：calcMonthScore 回傳加權 0–1.10 分數，×100 轉百分制
  const aKpi=kpiN?Math.round(kpiSum/kpiN*100):0;
  const eff=Math.round(gross/n/1000);
  const dim=new Date(2026,6,0).getDate(),timePct=Math.round(11/dim*100),gGap=aGross-timePct;
  const cs=(typeof S!=='undefined'&&S.cases)?S.cases:[];
  const actCase=cs.filter(c=>c.stage<=5).length, odCase=cs.filter(c=>typeof isOverdue==='function'&&isOverdue(c)).length;
  const custN=(typeof S!=='undefined'&&S.customers)?S.customers.length:0;
  const potN=(typeof S!=='undefined'&&S.customers)?S.customers.filter(c=>c.status==='潛在').length:0;
  const todoN=(typeof S!=='undefined'&&S.todos)?S.todos.filter(t=>!t.done).length:0;
  const usersN=(typeof getUsers==='function')?Object.keys(getUsers()).length:0;
  const fmt=v=>Math.round(v).toLocaleString('en-US');


  const lt=(pp,inv)=>{const ok=inv?pp<=100:pp>=90,w=inv?pp<=110:pp>=70;return ok?'var(--sem-up)':w?'var(--sem-warn)':'var(--sem-down)';};
  function barCard(title,page,big,goal,pct,inv,sub,vs,ratio,ratioC){
    var hasGoal = goal!=null && pct!=null;
    var barW = hasGoal ? Math.min(pct,100) : (ratio!=null?Math.min(ratio,100):0);
    var barC = hasGoal ? lt(pct,inv) : (ratioC||'var(--text-3)');
    return '<div class="bcard" onclick="go(\''+page+'\')">'
      +'<div class="bc-head"><span class="bc-title">'+title+'</span><span class="bc-exp">⤢</span></div>'
      +'<div class="bc-big">'+big+'</div>'
      +(goal!=null?'<div class="bc-goal">Goal:&nbsp;&nbsp;<b>'+goal+'</b></div>':'<div class="bc-goal" style="visibility:hidden">.</div>')
      +'<div class="bc-bar"><i style="width:'+barW+'%;background:'+barC+'"></i></div>'
      +(vs?'<div class="bc-vs">'+vs+'</div>':'')
      +(sub?'<div class="bc-sub">'+sub+'</div>':'')+'</div>';
  }

  // KPI 各項進度卡：主視覺=真實業務數字(金額/件數/家數)，進度條=得分/滿分
  function kpiItemCards(rows){
    // 跨 scope 聚合每項真實數字
    var agg={};
    rows.forEach(function(r){ agg[r.id]={val:0,target:0,unit:'',isMoney:false,detail:'',hasTarget:false}; });
    ppl.forEach(function(u){
      var d=getMD(u.email,MONTH); var gt=(getTgts(u.email)[MONTH]||1000000);
      rows.forEach(function(r){
        var m=kpiRealMetric({id:r.id},d,gt);
        agg[r.id].val+=(m.val||0);
        if(m.target!=null){agg[r.id].target+=m.target; agg[r.id].hasTarget=true;}
        agg[r.id].unit=m.unit; agg[r.id].isMoney=!!m.isMoney; agg[r.id].detail=m.detail||'';
      });
    });
    var nP=ppl.length||1;
    // 進度條：依達成率上色，未達成灰色；超過120%綠+黃尾段
    function kpiBar(sp){
      // sp = 達成率%（可>120）；採共用配色規則
      var v=barViz(sp);
      return '<div class="kbar-row">'+v.bar+'<span class="kbar-pct" style="color:'+v.num+'">'+sp+'%</span></div>';
    }
    // 鎖定狀態（同一視圖下所有項目一致）：只有當月·週尺度·未審核才可改
    var lock=(typeof kpiLockState==='function')?kpiLockState(curEmail(),MONTH):{editable:true,reason:''};
    return rows.map(function(r,idx){
      var a=agg[r.id];
      var full=Math.round(r.w*100*10)/10;
      var cur=Math.round(r.s*100*10)/10;
      var sp=full?Math.round(cur/full*100):0;        // 達成率%
      var key=r.id;
      var num=idx+1;                                  // 優先順序編號

      // (2-1) 大字實績(黑) / 小字目標+單位(黑)
      var curTxt=a.isMoney?fmt(a.val):(Math.round(a.val*10)/10);
      var tgtTxt=a.isMoney?fmt(a.target):a.target;
      var big='<b style="color:var(--t)">'+curTxt+'</b>'
        +'<small style="font-size:15px;font-weight:500;color:var(--t);margin-left:4px"> / '+tgtTxt+' '+a.unit+'</small>';

      // (2-2) 展開明細：數字說明 + 單位 + 意義
      var meaning={
        gross:'達成個人毛利目標，業務之本（SAP 自動結算）',
        design:'推進非主力品牌進入客戶設計案，以階段躍遷計分',
        brand:'同月同客戶出貨 ≥2 品牌之客戶家數',
        factory:'偕同原廠 PM／FAE 拜訪客戶之次數',
        visit:'依客戶分層加權之拜訪量（重點×1.8＋一般×0.6）',
        relate:'重點客戶私下關係深耕活動次數',
        newcust:'過去 12 個月無交易客戶之首次成交家數'
      }[key]||'';
      var autoFill=(key==='gross'||key==='newcust');  // SAP 自動，不可手填
      var unitTxt=a.unit;
      // 填報區：依鎖定狀態決定可填或唯讀(看紀錄)
      var fillBlock;
      if(autoFill){
        fillBlock='<div style="font-size:10.5px;color:var(--t3);margin-top:8px">※ 此項由 SAP 自動結算，無法手動修改。</div>';
      } else if(!lock.editable){
        fillBlock='<div style="margin-top:10px;padding:8px 10px;background:var(--sf2);border:1px solid var(--bd);border-radius:8px;display:flex;align-items:center;gap:7px">'
          +'<span style="font-size:13px">🔒</span>'
          +'<span style="font-size:11.5px;color:var(--t2);line-height:1.4">'+lock.reason+'<br><span style="color:var(--t3);font-size:10.5px">目前值：'+(Math.round(a.val*10)/10)+' '+unitTxt+'（僅供查閱）</span></span></div>';
      } else {
        fillBlock='<div style="margin-top:12px"><div style="font-size:10.5px;color:#5D8722;margin-bottom:6px">✏️ 可填報本週（W'+(curWeekIndexInMonth(MONTH))+'）數字，主管審核後鎖定</div>'
          +'<div style="display:flex;gap:8px;align-items:center;max-width:320px">'
          +'<input type="number" class="kedit-inp" id="kedit-inp-'+key+'" value="'+(Math.round(a.val*10)/10)+'" min="0" style="flex:1">'
          +'<button class="btn btn-gold btn-sm" style="margin:0" onclick="event.stopPropagation();saveKpiQuick(\''+key+'\')">儲存</button></div></div>';
      }
      var editPanel='<div class="card-detail">'
        +'<div style="font-size:11px;color:var(--t3);margin-bottom:8px">單位：'+unitTxt+(a.isMoney?'（NTD）':'')+'　·　'+(autoFill?'SAP 自動帶入':(lock.editable?'可手動填報，主管核實':'已鎖定，僅供查閱'))+'</div>'
        + statRowLine(periodTxt+'實績', (a.isMoney?fmt(a.val):Math.round(a.val*10)/10)+' '+unitTxt, 'var(--t)')
        + statRowLine('目標', (a.isMoney?fmt(a.target):a.target)+' '+unitTxt, '#AF7231')
        + statRowLine('達成率', sp+' %', barViz(sp).num)
        + statRowLine('KPI 得分', cur+' / '+full+' 分', '#2677A5')
        + (meaning?'<div style="font-size:11.5px;color:var(--t2);margin-top:10px">'+meaning+'</div>':'')
        + fillBlock
        +'</div>';

      return '<div class="bcard kcard scard-exp" id="kcard-'+key+'">'
        +'<div class="bc-head"><span class="kpi-num">'+num+'.</span><span class="bc-title" style="color:var(--t)">'+r.n+'</span>'
        +'<span class="bc-exp" onclick="event.stopPropagation();toggleCardExpand(\'kcard-'+key+'\')" style="cursor:pointer" title="展開">⤢</span></div>'
        +'<div class="bc-big">'+big+'</div>'
        + kpiBar(sp)
        + editPanel
        +'</div>';
    }).join('');
  }


  // ── 新增財務指標（demo 模型；正式接 SAP 後替換）──
  // 庫存金額、新增訂單、逾期應收款（demo；可由卡片展開手動覆蓋，單位萬）
  const ovr=function(k,def){var v=localStorage.getItem('stat_override_'+k+'_'+MONTH);return v!=null?(parseFloat(v)*10000):def;};
  const inv = ovr('inv', Math.round(gross*1.6));
  const newOrder = ovr('neworder', Math.round(gross*1.25));
  const overdueAR = (typeof arTotalWan==='function') ? arTotalWan()*10000 : ovr('ar', Math.round(gross*0.18));  // 逾期金額 = 客戶清單加總
  // 庫存金額 / 月毛利總額 之比例（例：庫存3000萬 ÷ 月毛利600萬 = 500%），非毛利率
  const invRatio = gross?Math.round(inv/gross*100):0;
  // 風險庫存月數 = 風險庫存金額 ÷ 近 3 個月平均月出貨成本
  // 月出貨成本 ≈ 月出貨營收 ×(1-毛利率)；demo：營收≈毛利/0.2、成本≈營收×0.8 → 約 毛利×4
  const monCost = (function(){
    var emails=[curEmail()]; var totCost=0, cnt=0;
    var tm=new Date().getMonth()+1;
    for(var k=0;k<3;k++){ var mm=tm-k; if(mm<1)break;
      var gg=0; emails.forEach(function(em){var d=getMD(em,mm);if(d&&d.items&&d.items.gross)gg+=itemTotal(d.items.gross);});
      if(gg>0){ totCost += gg*4; cnt++; }   // 該月出貨成本 ≈ 毛利 ×4
    }
    if(!cnt) return gross*4||1;             // 無歷史資料則用本月推估
    return totCost/cnt;
  })();
  const invMonths = monCost? Math.round(inv/monCost*10)/10 : 0;   // 庫存月數(1 位小數)
  window.__INV_MONTHS = invMonths;
  const fmtW = v => (Math.round(v/10000)).toLocaleString('en-US')+' 萬';

  // ── 與上期比較（趨勢徽章用）──：依尺度取上一期的毛利基準，套同係數推估上期值
  // 週→上週、月→上月、年→去年；demo 以毛利為基準推估(待接 SAP 改真實值)
  var prevGross = (function(){
    var em=curEmail();
    if(DASH_VIEW==='week'){
      var wi=(typeof curWeekIndexInMonth==='function')?curWeekIndexInMonth(MONTH):1;
      if(wi<=1) return null;                       // 本月第一週無上週可比
      var d=getMD(em,MONTH); var s=0;
      if(d&&d.items&&d.items.gross){ for(var w=1;w<wi;w++) s+=parseFloat(d.items.gross['w'+w]||0); }
      return s;                                     // 上週「累積」(到 wi-1)
    } else if(DASH_VIEW==='month'){
      var pm=MONTH-1; if(pm<1) return null;
      var dd=getMD(em,pm); return dd&&dd.items&&dd.items.gross?itemTotal(dd.items.gross):0;
    } else {
      var py=(CFG.year||new Date().getFullYear())-1, sy=0, has=false;
      for(var mm=1;mm<=12;mm++){var d2=getMDYear(em,py,mm);if(d2&&d2.items&&d2.items.gross){sy+=itemTotal(d2.items.gross);has=true;}}
      return has?sy:null;
    }
  })();
  // 本期毛利累積(對應上期口徑)
  var curGrossForTrend = (function(){
    if(DASH_VIEW==='week') return gross;            // gross 已是本週累積
    if(DASH_VIEW==='month') return gross;
    return gross;
  })();
  var prevLabel = DASH_VIEW==='year'?'去年':DASH_VIEW==='week'?'上週':'上月';
  // 趨勢徽章：cur vs prev，pct 變化；good 方向可反轉(逾期/庫存：減少=好=綠)
  // 統一邏輯：上升=綠(好) / 下降=紅(警告)，所有卡片一致。
  function trendBadge(cur, prev){
    if(prev==null || prev===0){
      return '<span style="font-size:11px;color:var(--t3)">— 無上期可比</span>';
    }
    var pct = Math.round((cur-prev)/Math.abs(prev)*100);
    var up = pct>0, flat = pct===0;
    var col = flat ? 'var(--t3)' : (up ? '#5D8722' : '#C9302C');   // 升綠 / 降紅
    var arrow = flat ? '→' : (up ? '▲' : '▼');
    var sign = pct>0?'+':'';
    return '<span style="display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:800;color:'+col+'">'
      +'<span style="font-size:11px">'+arrow+'</span>'+sign+pct+'%'
      +'<span style="font-size:10px;color:var(--t3);font-weight:500">vs '+prevLabel+'</span></span>';
  }
  // 三張無目標卡的上期推估值(同係數)
  var prevNewOrder = prevGross==null?null:Math.round(prevGross*1.25);
  var prevInvMonths = (function(){
    if(prevGross==null||!prevGross) return null;
    var prevInv = prevGross*1.6, prevCost = prevGross*4;
    return prevCost? Math.round(prevInv/prevCost*10)/10 : null;
  })();
  var prevOverdue = prevGross==null?null:Math.round(prevGross*0.18);

  // 6 張卡片一排 — 比照 KPI 卡格式：黑字實績/目標 + 進度條(同配色) + 右上展開編輯
  function statBar(pct){
    var v=barViz(pct);
    return '<div class="kbar-row">'+v.bar+'<span class="kbar-pct" style="color:'+v.num+'">'+pct+'%</span></div>';
  }
  // actual/target 為顯示字串；pct 為進度%(null=不顯示進度條)；skey 可展開編輯
  // 通用：數字說明列
  function statRowLine(label, val, color){
    return '<div style="display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:1px dashed var(--bd)">'
      +'<span style="font-size:12.5px;color:var(--t2)">'+label+'</span>'
      +'<span style="font-size:16px;font-weight:700;color:'+(color||'var(--t)')+'">'+val+'</span></div>';
  }
  function statCard(title, actual, target, unit, pct, skey, detailHtml, extraHtml, barOverride){

// 「本週填寫」：平滑捲動至 KPI 各項進度區塊並短暫高亮
function scrollToKpiItems(){
  var el=document.getElementById('kpi-items-anchor');
  if(!el) return;
  el.scrollIntoView({behavior:'smooth', block:'start'});
  var grid=el.nextElementSibling;
  if(grid){ grid.style.transition='box-shadow .4s'; grid.style.boxShadow='0 0 0 3px rgba(223,156,65,.45)';
    setTimeout(function(){ grid.style.boxShadow='none'; }, 1400); }
}

// 待辦清單（row-2 卡片內容）：勾選、事項、優先級徽章(自動排序)、期限、刪除 + 新增列
// 艾森豪矩陣（2×2）：列=重要/不重要、欄=緊急/不緊急；每格顯示件數 + 事項標題
function renderEisenhower(){
  var all=getPTodos().filter(function(t){return !t.done;});
  var q1=[],q2=[],q3=[],q4=[];
  all.forEach(function(t){
    if(t.important&&t.urgent) q1.push(t);
    else if(t.important&&!t.urgent) q2.push(t);
    else if(!t.important&&t.urgent) q3.push(t);
    else q4.push(t);
  });
  function cell(items, title, action, col, bg){
    var lis = items.length ? items.slice(0,4).map(function(t){
      return '<div style="font-size:10px;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5">· '+t.title+'</div>';

function renderTodos() {
  const todos = getTodos();
  const users = getUsers();

  let filtered = todos;
  if (TODO_DEPT_FILTER)   filtered = filtered.filter(t => t.dept === TODO_DEPT_FILTER);
  if (TODO_STATUS_FILTER === 'pending') filtered = filtered.filter(t => !t.done);
  if (TODO_STATUS_FILTER === 'done')    filtered = filtered.filter(t => t.done);

  // Sort: pending first, then by due date ascending
  filtered.sort((a,b) => (a.done?1:0) - (b.done?1:0) || (a.due||'9999').localeCompare(b.due||'9999'));

  const today = new Date().toISOString().slice(0,10);
  const deptSummary = DEPTS.map(d => {
    const ts = todos.filter(t => t.dept === d.name);
    return {
      ...d,
      total: ts.length,
      done: ts.filter(t=>t.done).length,
      overdue: ts.filter(t=>!t.done && t.due && t.due < today).length,
    };
  });

  const deptOptions = `
    <option value="" ${!TODO_DEPT_FILTER?'selected':''}>全部部門</option>
    <optgroup label="台灣">
      ${DEPTS.filter(d=>d.region==='台灣').map(d=>`<option value="${d.name}" ${TODO_DEPT_FILTER===d.name?'selected':''}>${d.name}</option>`).join('')}
    </optgroup>
    <optgroup label="大陸">
      ${DEPTS.filter(d=>d.region==='大陸').map(d=>`<option value="${d.name}" ${TODO_DEPT_FILTER===d.name?'selected':''}>${d.name}</option>`).join('')}
    </optgroup>
    <optgroup label="香港">
      ${DEPTS.filter(d=>d.region==='香港').map(d=>`<option value="${d.name}" ${TODO_DEPT_FILTER===d.name?'selected':''}>${d.name}</option>`).join('')}
    </optgroup>`;

  const userOptions = Object.values(users).map(u => `<option value="${u.email}">${u.name}（${u.email}）</option>`).join('');

  const totalCnt = todos.length;
  const doneCnt  = todos.filter(t=>t.done).length;
  const overCnt  = todos.filter(t=>!t.done && t.due && t.due < today).length;

  return `
<div class="ph">
  <div class="ph-row">
    <div><h1>${t('todo_title')}</h1><p>${CFG.year}</p></div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <select onchange="setTodoDept(this.value)" style="padding:7px 10px;border:1px solid var(--bd2);border-radius:4px;font-size:13px;background:var(--sf);color:var(--t)">${deptOptions}</select>
      <select onchange="setTodoStatus(this.value)" style="padding:7px 10px;border:1px solid var(--bd2);border-radius:4px;font-size:13px;background:var(--sf);color:var(--t)">
        <option value="all" ${TODO_STATUS_FILTER==='all'?'selected':''}>全部狀態</option>
        <option value="pending" ${TODO_STATUS_FILTER==='pending'?'selected':''}>待處理</option>
        <option value="done" ${TODO_STATUS_FILTER==='done'?'selected':''}>已完成</option>
      </select>
    </div>
  </div>
</div>

<div class="grid g4 mb16">
  <div class="stat"><div class="stat-lbl">總項目</div><div class="stat-val">${totalCnt}</div></div>
  <div class="stat"><div class="stat-lbl">已完成</div><div class="stat-val c-green">${doneCnt}</div><div class="stat-sub">${totalCnt?Math.round(doneCnt/totalCnt*100):0}%</div></div>
  <div class="stat"><div class="stat-lbl">待處理</div><div class="stat-val">${totalCnt-doneCnt}</div></div>
  <div class="stat"><div class="stat-lbl">逾期</div><div class="stat-val c-red">${overCnt}</div></div>
</div>

<div class="card mb16">
  <div class="card-title">➕ 新增待辦事項</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">
    <div class="fg" style="margin:0;flex:2;min-width:200px"><label>項目 *</label><input type="text" id="td-title" placeholder="要完成什麼？"></div>
    <div class="fg" style="margin:0;flex:1.3;min-width:180px"><label>負責人 *</label>
      <select id="td-assignee"><option value="">（請選擇）</option>${userOptions}</select>
    </div>
    <div class="fg" style="margin:0;flex:1;min-width:140px"><label>完成期限 *</label><input type="date" id="td-due" value="${today}"></div>
    <div class="fg" style="margin:0;flex:1;min-width:140px"><label>部門 *</label>
      <select id="td-dept">
        <option value="">（請選擇）</option>
        <optgroup label="台灣">${DEPTS.filter(d=>d.region==='台灣').map(d=>`<option value="${d.name}">${d.name}</option>`).join('')}</optgroup>

        <optgroup label="香港">${DEPTS.filter(d=>d.region==='香港').map(d=>`<option value="${d.name}">${d.name}</option>`).join('')}</optgroup>
      </select>

  </div>

  <div class="card-title">部門彙總</div>
  <div class="tbl-wrap">
    <table>
      <thead><tr><th>部門</th><th class="tc">總項目</th><th class="tc">已完成</th><th class="tc">待處理</th><th class="tc">逾期</th><th class="tc">完成率</th></tr></thead>
      <tbody>${deptSummary.map(s => {
        const pct = s.total ? Math.round(s.done/s.total*100) : 0;
        const pending = s.total - s.done;
        return `<tr>
          <td><span class="badge ${REGION_BADGE[s.region]||'bg-gray'}">${s.region}</span> <strong>${s.name}</strong></td>
          <td class="tc">${s.total}</td>
          <td class="tc c-green">${s.done}</td>
          <td class="tc">${pending}</td>
          <td class="tc ${s.overdue?'c-red':''}">${s.overdue}</td>
          <td class="tc"><strong>${pct}%</strong></td>
        </tr>`;
      }).join('')}</tbody>
    </table>
  </div>
</div>

<div class="card">
  <div class="card-title">待辦清單${TODO_DEPT_FILTER?` — ${TODO_DEPT_FILTER}`:''}</div>
  ${filtered.length ? `
  <div class="tbl-wrap">
    <table>
      <thead><tr><th class="tc">✓</th><th>項目</th><th>負責人</th><th>期限</th><th>部門</th><th class="tc">操作</th></tr></thead>
      <tbody>${filtered.map(t => {
        const u = users[t.assignee];
        const overdue = !t.done && t.due && t.due < today;
        const dueClr = overdue ? 'c-red' : (!t.done && t.due === today ? 'c-yellow' : '');
        return `<tr style="${t.done?'opacity:.55':''}">
          <td class="tc"><input type="checkbox" ${t.done?'checked':''} onchange="toggleTodo('${t.id}')"></td>
          <td style="${t.done?'text-decoration:line-through':''}">${t.title}</td>
          <td style="font-size:12px">${u?u.name:'<span style="color:var(--t3)">—</span>'} <span style="color:var(--t3);font-size:10px">${t.assignee||''}</span></td>
          <td class="${dueClr}" style="font-size:12px;font-weight:${overdue?700:400}">${t.due||'—'}${overdue?' <span style="font-size:10px">⚠️逾期</span>':''}</td>
          <td>${t.dept?`<span class="badge bg-gray">${t.dept}</span>`:'—'}</td>
          <td class="tc"><button class="btn btn-ghost btn-sm" style="color:var(--rd)" onclick="deleteTodo('${t.id}')">🗑️</button></td>
        </tr>`;
      }).join('')}</tbody>
    </table>
  </div>` : `<div style="color:var(--t3);font-size:13px;padding:12px 0">${todos.length?'目前篩選條件下沒有待辦':'尚無待辦事項，先新增一個吧。'}</div>`}
</div>`;
}

function setTodoDept(v)   { TODO_DEPT_FILTER = v || ''; go('todos'); }
function setTodoStatus(v) { TODO_STATUS_FILTER = v || 'all'; go('todos'); }

function addTodo() {
  const title    = (document.getElementById('td-title').value    || '').trim();
  const assignee = (document.getElementById('td-assignee').value || '').trim();
  const due      = document.getElementById('td-due').value || '';
  const dept     = document.getElementById('td-dept').value || '';
  if (!title)    { alert('❌ 請輸入項目'); return; }
  if (!assignee) { alert('❌ 請選擇負責人'); return; }
  if (!due)      { alert('❌ 請選擇完成期限'); return; }
  if (!dept)     { alert('❌ 請選擇部門'); return; }
  const todos = getTodos();
  todos.push({
    id: 't'+Date.now().toString(36)+Math.random().toString(36).slice(2,6),
    title, assignee, due, dept,
    done: false,
    createdBy: CU.email,
    createdAt: new Date().toISOString(),
  });
  setTodos(todos);
  go('todos');
}

function toggleTodo(id) {
  const todos = getTodos();
  const t = todos.find(x => x.id === id);
  if (!t) return;
  t.done = !t.done;
  t.completedAt = t.done ? new Date().toISOString() : null;
  setTodos(todos);
  go('todos');
}

function deleteTodo(id) {
  if (!confirm('確定刪除此待辦？')) return;
  setTodos(getTodos().filter(t => t.id !== id));
  go('todos');
}

    }

};

function applyTheme(key){
  const t = THEMES[key] || THEMES.notion;
  const root = document.documentElement;
  Object.entries(t.vars).forEach(([k,v]) => root.style.setProperty(k, v));

  // Apply extras via dynamic stylesheet so we override the static rules
  let s = document.getElementById('tw-theme-extra');
  if (!s) { s = document.createElement('style'); s.id = 'tw-theme-extra'; document.head.appendChild(s); }
  const [a,b,c,d] = t.extra.statTints;
  s.textContent = `
    .grid.g4 .stat:nth-child(1){background:${a};border-color:var(--bd)}
    .grid.g4 .stat:nth-child(2){background:${b};border-color:var(--bd)}
    .grid.g4 .stat:nth-child(3){background:${c};border-color:var(--bd)}
    .grid.g4 .stat:nth-child(4){background:${d};border-color:var(--bd)}
    .btn-primary{background:${t.extra.btnBg};color:#fff}
    .btn-primary:hover{background:${t.extra.btnHover};box-shadow:0 1px 3px rgba(0,0,0,.12)}
    .btn-green{background:${t.extra.btnBg};color:#fff}
    .btn-green:hover{background:${t.extra.btnHover};box-shadow:0 1px 3px rgba(0,0,0,.12)}
    .tab.active{background:${t.extra.btnBg};color:#fff;border-color:${t.extra.btnBg}}
    .wtab.active{background:${t.extra.btnBg};color:#fff;border-color:${t.extra.btnBg}}
  `;

  // Mark active card
  document.querySelectorAll('#tw-themes .tw-opt').forEach(el => {
    el.dataset.active = (el.dataset.key === key) ? '1' : '0';
    el.style.borderColor = el.dataset.active==='1' ? '#1A1A1A' : 'rgba(55,53,47,.12)';
    el.style.background  = el.dataset.active==='1' ? '#F5F5F5' : '#fff';
  });
}

function renderTwOptions(current){
  const host = document.getElementById('tw-themes');
  host.innerHTML = Object.entries(THEMES).map(([key,t]) => `
    <div class="tw-opt" data-key="${key}" style="padding:10px 12px;border:1px solid rgba(55,53,47,.12);border-radius:6px;cursor:pointer;transition:all var(--dur-fast) var(--ease)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <div style="display:flex;gap:2px">
          ${Object.values(t.extra.statTints).map(c=>`<div style="width:10px;height:14px;background:${c};border:1px solid rgba(0,0,0,.06);border-radius:2px"></div>`).join('')}
        </div>
        <div style="font-size:12px;font-weight:700;color:#1A1A1A">${t.name}</div>
      </div>
      <div style="font-size:11px;color:#737373">${t.desc}</div>
    </div>
  `).join('');
  host.querySelectorAll('.tw-opt').forEach(el => {
    el.onclick = () => {
      const k = el.dataset.key;
      applyTheme(k);
      try { localStorage.setItem('kpi.theme', k); } catch(e){}
      window.parent.postMessage({type:'__edit_mode_set_keys', edits:{theme:k}}, '*');
    };
  });
}

(function initTweaks(){
  // First, register listener BEFORE announcing availability
  window.addEventListener('message', (e) => {
    const d = e.data || {};
    if (d.type === '__activate_edit_mode')   document.getElementById('tw-panel').style.display = 'block';
    if (d.type === '__deactivate_edit_mode') document.getElementById('tw-panel').style.display = 'none';
  });

  // Resolve initial theme: localStorage > defaults > notion
  let initial = TWEAK_DEFAULTS.theme || 'notion';
  try { const ls = localStorage.getItem('kpi.theme'); if (ls && THEMES[ls]) initial = ls; } catch(e){}

  renderTwOptions(initial);
  applyTheme(initial);

  // Announce to host
  try { window.parent.postMessage({type:'__edit_mode_available'}, '*'); } catch(e){}
})();
</script>

let fK={od:false,ntdk:false};
function matchCase(c){
  if(fK.od&&!isOverdue(c))return false;
  if(fK.ntdk&&!((c.items||[]).some(i=>i.brand&&i.brand!=="TDK")||(c.brand&&c.brand!=="TDK")))return false;
  const q=C$("qCase").value.trim().toLowerCase();if(!q)return true;
  return[c.name,(c.items||[]).map(i=>i.brand+" "+i.part).join(" "),c.app,custOf(c.cust).name].join(" ").toLowerCase().includes(q);}
function renderKanban(){

  C$("kanban").innerHTML=[1,2,3,4,5,0].filter(st=>true).sort((a,b)=>a-b).map(st=>{
    const cs=act.filter(c=>c.stage===st);
    return`<div class="kcol"><div class="kcol-h"><span class="dot" style="background:${STAGE_COLORS[st]}"></span>${st}・${STAGE_NAMES[st]}<span class="cnt">${cs.length}</span></div>

/* 報表匯出（原型：CSV；正式版：xlsx 原格式分頁） */
function dl(name,rows){
  const csv="\uFEFF"+rows.map(r=>r.map(x=>`"${String(x??"").replace(/"/g,'""')}"`).join(",")).join("\n");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download=name;a.click();}
function exportTDK(){
  const head=["業務","Customer(Eng)","客戶別","BU","建議TDK item","Source","產業別","Application","產品架構","End customer","Type","IC","Model Name","種類","已使用TDK item/需求特定值","狀況說明","Usage(pcs/set)","預估生產台數(K set/M)","Demand(Kpcs/M)","Price(USD)","Amount(K USD)","競合者/料號","送樣","承認","EVT","DVT","PVT","PO in","MP","更新","Status"];
  const rows=[];
  S.cases.forEach(c=>{const cu=custOf(c.cust);const lp=(c.progressLog||[]).slice(-1)[0]||{};
    const its=(c.items&&c.items.length)?c.items:[{brand:c.brand||"",part:c.part||"",usage:c.usage,price:c.price,compete:c.compete,st:c.stage}];
    its.forEach(it=>{const demand=(it.usage&&c.sets)?it.usage*c.sets:"";const amount=(demand&&it.price)?Math.round(demand*it.price):"";
      rows.push(["我",cu.en||"",cu.name,c.bu||"",`${it.brand?it.brand+" ":""}${it.part||""}`,c.source||"",cu.domain||"",c.app||"",c.arch||"",c.endCust||"",c.odm||"",c.ic||"",c.model||"",c.kind||"",c.spec||"",lp.text||"",it.usage||"",c.sets||"",demand,it.price||"",amount,it.compete||"",(it.st||c.stage)>=2?"o":"x",(it.st||c.stage)>=3?"o":"x",c.evt||"",c.dvt||"",c.pvt||"",(it.st||c.stage)>=5?"o":"x",c.mp||"",fmtTs(lp.ts),STAGE_NAMES[c.stage]]);});});
  dl("TDK重點客戶管理表.csv",[head,...rows]);crmToast("已匯出 "+rows.length+" 筆案件");}
function exportTF(){
  const head=["作戰隊領域","業務","調查進度追蹤(最新)","產業別","客戶","英文名","聯繫窗口","地址","有無交易過","補述"];
  const rows=[];
  S.customers.filter(c=>(c.tf||[]).length).forEach(c=>{
    const last=lastActivity(c.id);
    const ctStr=(c.contacts||[]).map(t=>`${t.name}/${t.role||""}/${t.mobile||""}`).join("；");
    c.tf.forEach(d=>rows.push([d,"我",last?fmtTs(last):"未開始",c.domain||"",c.name,c.en||"",ctStr,c.coAddr||"",c.status==="正式"?"有":"無",(c.deep&&c.deep.core)||""]));});
  dl("重點產業開發表.csv",[head,...rows]);crmToast("已匯出 "+rows.length+" 筆開發紀錄");}
/* ═══════ 建檔 ═══════ */
let selReg=new Set(),selInd=new Set(["網通"]),selTier="B",selStat="正式",selTF=new Set();

  C$("chipStat").innerHTML=["正式","潛在"].map(t=>`<button class="chipbtn ${selStat===t?"on":""}" onclick="selStat='${t}';renderChips()">${t}</button>`).join("");
  C$("chipTF").innerHTML=TASKFORCE.map(v=>`<button class="chipbtn ${selTF.has(v)?"on":""}" onclick="tg(selTF,'${v}')">${v}</button>`).join("");
  C$("chipTier").innerHTML=["A","B","C"].map(t=>`<button class="chipbtn ${selTier===t?"on":""}" onclick="selTier='${t}';renderChips()">${t} ${({A:"重點",B:"成長",C:"維持"})[t]}</button>`).join("");
  C$("chipInd").innerHTML=INDUSTRIES.map(v=>`<button class="chipbtn ${selInd.has(v)?"on":""}" onclick="tg(selInd,'${v}')">${v}</button>`).join("");
  C$("chipReg").innerHTML=BRANDS.map(v=>`<button class="chipbtn ${selReg.has(v)?"on":""}" onclick="tg(selReg,'${v}')">${v}</button>`).join("");
}
function tg(set,v){set.has(v)?set.delete(v):set.add(v);renderChips();}
function addCust(){
  S.customers.push({id:S.nextId++,name:creq(C$("cName").value,"客戶名稱必填"),en:C$("cEn").value,status:selStat,tf:[...selTF],contacts:[],tier:selTier,
    domain:[...selInd].join("/"),reg:[...selReg],

  save();closeSheet("shCust");renderCustList();crmToast("客戶已建檔");}
function addCase(){
  const st=+C$("kStage").value;
  const c={id:S.nextId++,name:creq(C$("kName").value,"案件名稱必填"),cust:+C$("kCust").value,
    app:creq(C$("kApp").value,"應用產品必填"),ccy:C$("kCcy").value,follow:creq(C$("kFollow").value,"下次追蹤日期必填"),
    endCust:C$("kEnd").value,items:[],
    bu:C$("kBU").value,source:C$("kSource").value,kind:C$("kKind").value,odm:C$("kOdm").value,arch:C$("kArch").value,ic:C$("kIC").value,model:C$("kModel").value,spec:C$("kSpec").value,
    sets:+C$("kSets").value||null,evt:C$("kEVT").value,dvt:C$("kDVT").value,pvt:C$("kPVT").value,

    progressLog:C$("kProgress").value.trim()?[{week:S.curWeek,text:C$("kProgress").value.trim(),ts:nowTs()}]:[],
    stage:st,history:[{stage:st,week:S.curWeek,ts:nowTs()}]};
  S.cases.push(c);
  if(STAGE_SCORES[st]>0)S.stageEvents.push({case_id:c.id,brand:itemBrand(c),stage:st,week:S.curWeek});
  ["kName","kApp","kEnd","kProgress","kBU","kSource","kArch","kIC","kModel","kSpec","kSets"].forEach(i=>$(i).value="");
  save();closeSheet("shCase");renderKanban();crmToast("案件已建檔");}



/* ═══ 一鍵看結果：CRM ⇄ KPI 橋接 ═══ */
function dailyDigest(){
  const dim=new Date(2026,6,0).getDate(),day=11,timePct=Math.round(day/dim*100);
  const today=v=>String(v.ts||"").slice(0,10)===TODAY;
  const tV=S.visits.filter(today).length;
  const tP=S.cases.reduce((t,k)=>t+(k.progressLog||[]).filter(today).length,0);
  const tA=S.stageEvents.filter(e=>e.week===S.curWeek).length;
  const mV=S.visits.length,mP=S.cases.reduce((t,k)=>t+(k.progressLog||[]).length,0);
  return `<div class="card" style="margin-top:14px"><div class="card-title">📋 經營日報</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:10px 0;text-align:center">
      <div style="background:var(--sf2);border-radius:12px;padding:10px 4px"><div style="font-size:11px;color:var(--t2)">今日小計</div><div class="stat-val">${tV+tP}</div><div style="font-size:10px;color:var(--t3)">拜訪 ${tV}・進展 ${tP}</div></div>
      <div style="background:var(--sf2);border-radius:12px;padding:10px 4px"><div style="font-size:11px;color:var(--t2)">本月累計</div><div class="stat-val">${mV+mP}</div><div style="font-size:10px;color:var(--t3)">拜訪 ${mV}・進展 ${mP}・推進 ${tA}</div></div>
      <div style="background:var(--sf2);border-radius:12px;padding:10px 4px"><div style="font-size:11px;color:var(--t2)">序時基準 ${hintIcon('本月時間進度；達成率低於此值即落後')}</div><div class="stat-val">${timePct}%</div><div style="font-size:10px;color:var(--t3)">${day}/${dim} 天</div></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:0 0 10px;text-align:center">
      <div onclick="go('crmcase')" style="background:var(--sf2);border-radius:12px;padding:10px 4px;cursor:pointer"><div style="font-size:11px;color:var(--t2)">活躍案件</div><div class="stat-val">${S.cases.filter(c=>c.stage<=5).length}</div></div>
      <div onclick="fK.od=true;go('crmcase')" style="background:var(--sf2);border-radius:12px;padding:10px 4px;cursor:pointer"><div style="font-size:11px;color:var(--t2)">追蹤逾期</div><div class="stat-val" style="color:${S.cases.filter(isOverdue).length?'var(--rd)':'var(--t)'}">${S.cases.filter(isOverdue).length}</div></div>
    </div>

    </div>`;}
function crmEntryBar(){
  return `<div class="card" style="margin-bottom:14px">
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="crmAutoSubmit()">產生本週並送出 ${hintIcon('系統自動帶入：Design-in／拜訪分層／偕同／多品牌／深耕計分；毛利與新客戶開發由 SAP 結算')}</button>
      <button class="btn btn-ghost btn-sm" onclick="go('catalog')">KPI 制度</button></div></div>`;}
function crmAutofill(){
  try{
    const d=getMD(CU.email,MONTH)||emptyMD(CU.email);
    const dd=d.design_detail||emptyDesignDetail();
    dd.sample    =S.stageEvents.filter(e=>e.stage===2).length;
    dd.approval  =S.stageEvents.filter(e=>e.stage===3).length;
    dd.trial     =S.stageEvents.filter(e=>e.stage===4).length;
    dd.production=S.stageEvents.filter(e=>e.stage===5).length;
    d.design_detail=dd;
    if(d.items.design)d.items.design.w1=calcDesignScore(dd);
    // v20 拜訪分層加權：重點客戶(A級)×1.8 + 一般客戶(B/C級)×0.6，上限10
    {let keyN=0,genN=0;S.visits.forEach(v=>{const t=(custOf(v.cust).tier||'C');if(t==='A')keyN++;else genN++;});
      d.visit_score=Math.min(keyN*1.8+genN*0.6,10);
      if(d.items.visit){d.items.visit.w1=d.visit_score;[2,3,4,5].forEach(w=>d.items.visit['w'+w]=0);}}
    // factory 計分走 factory_visits 去重，將偕同記錄映射為 factory_visits（以原廠/品牌名為去重鍵）
    d.factory_visits=(S.joints||[]).map(j=>({factory:(j.prod||j.principal_person||'').trim(),week:j.week,ts:j.ts}));
    // v20 多品牌滲透：同月同客戶出貨≥2個不同品牌之「客戶家數」
    if(d.items.brand){let fam=0;const byCust={};S.cases.forEach(c=>{if(c.stage>=2&&c.stage<=5)(c.items||[]).forEach(it=>{if(it.brand&&(it.st||c.stage)>=2){(byCust[c.cust]=byCust[c.cust]||new Set()).add(it.brand);}})});
      Object.values(byCust).forEach(set=>{if(set.size>=2)fam++;});
      d.items.brand.w1=fam;[2,3,4,5].forEach(w=>d.items.brand['w'+w]=0);}
    if(d.items.relate){d.items.relate.w1=S.rels.length;[2,3,4,5].forEach(w=>d.items.relate['w'+w]=0);}
    setMD(CU.email,MONTH,d);go('entry');crmToast("已帶入");
  }catch(e){crmToast("帶入失敗："+e.message);}
}
